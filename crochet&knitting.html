<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crochet & Knitting | Crochet For Her HK</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #f4f3f0; /* rhode 燕麥灰米色 */
            --card-bg: #ffffff;
            --text-main: #2d2c2a;
            --text-muted: #767471;
            --border-color: #e5e3df;
            --accent-staff: #8c8275;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            letter-spacing: -0.01em;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-left { display: flex; align-items: center; gap: 1.5rem; }
        .back-home { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
        .back-home:hover { color: var(--text-main); }

        .nav-right { display: flex; align-items: center; gap: 1.5rem; }

        .mode-toggle-container {
            display: none;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.6);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-staff); }
        input:checked + .slider:before { transform: translateX(20px); }

        main { padding: 4rem 5%; max-width: 1200px; margin: 0 auto; }

        .header-title { text-align: center; margin-bottom: 4rem; }
        .header-title h1 { font-size: 2.2rem; font-weight: 400; margin-bottom: 0.5rem; }
        .header-title p { color: var(--text-muted); font-size: 0.95rem; }

        /* 分類標籤 */
        .category-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin: 3rem 0 1.5rem 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* 職員面板 */
        #staff-panel {
            display: none;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            margin-bottom: 4rem;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); }
        .form-group input, .form-group textarea, .form-group select {
            padding: 0.75rem; border: 1px solid var(--border-color);
            border-radius: 8px; background-color: #faf9f6;
            color: var(--text-main); font-family: inherit; font-size: 0.9rem;
        }

        .submit-btn {
            background-color: var(--text-main); color: #fff; border: none;
            padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer; font-size: 0.9rem;
        }

        /* 商品展示 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        /* 🌟 補上上傳圖片後的展示樣式，避免大圖撐爆瀏覽器 */
        .product-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .product-image-placeholder {
            width: 100%; height: 280px; background-color: #faf9f6;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 0.85rem; border-bottom: 1px solid var(--border-color);
        }

        .product-info { padding: 1.5rem; }
        .product-title { font-size: 1.1rem; font-weight: 400; margin-bottom: 0.5rem; }
        
        .status-badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-right: 0.5rem;
        }
        .status-new { background-color: #2d2c2a; color: #ffffff; }
        .status-presale { background-color: #e2e8f0; color: #475569; }
        .status-soldout { background-color: #f1f1f0; color: #b5b3b0; }
        
        .product-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
        .product-price { font-weight: 500; font-size: 1.05rem; }
        
        .buy-btn {
            background: none; border: 1px solid var(--text-main); padding: 0.4rem 1rem;
            border-radius: 50px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
        }
        .buy-btn:hover { background-color: var(--text-main); color: #fff; }

        .staff-actions { display: none; position: absolute; top: 10px; right: 10px; }
        .delete-btn { background: rgba(239, 68, 68, 0.9); color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }

        body.staff-mode-active { border-top: 4px solid var(--accent-staff); }
        body.staff-mode-active .staff-actions { display: flex; }

        /* 🌟 自訂登入成功後的使用者資訊樣式 */
        .user-profile-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.8);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="back-home">← 返回主頁</a>
            <span style="font-weight: 500; font-size: 0.95rem;">Crochet & Knitting</span>
        </div>
        <div class="nav-right">
            <div class="mode-toggle-container" id="toggle-container">
                <span id="mode-status" style="font-size: 0.85rem;">顧客視角</span>
                <label class="switch">
                    <input type="checkbox" id="mode-checkbox" onchange="toggleViewMode()">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div id="login-container" style="display: flex; align-items: center;">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-size="medium"></div>
            </div>
        </div>
    </nav>

    <main>
        <div class="header-title">
            <h1>Crochet & Knitting 集市</h1>
            <p>在這裡，妳可以挑選倖存者親手鈎織的溫柔成品，或是帶走一扎療癒感官的嚴選毛線。</p>
        </div>

        <section id="staff-panel">
            <h3 style="color: var(--accent-staff); margin-bottom: 1.5rem;">🛠️ 職員後台：新增商品</h3>
            <form id="product-form" onsubmit="addNewProduct(event)">
                <div class="form-grid">
                   <div class="form-group">
                        <label for="prod-type">商品分類</label>
                        <select id="prod-type">
                            <option value="craft">Handcrafted Finished Pieces</option>
                            <option value="yarn">Premium Yarn & Materials</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="prod-status">商品狀態 (Status)</label>
                        <select id="prod-status">
                            <option value="">-- 常規商品 (無標籤) --</option>
                            <option value="new">New Product</option>
                            <option value="presale">Presale</option>
                            <option value="soldout">Out of Stock</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="prod-title">商品名稱</label>
                        <input type="text" id="prod-title" required placeholder="例如：霧粉色冰條線 / 療癒編織包">
                    </div>
                    <div class="form-group">
                        <label for="prod-price">定價 (HKD)</label>
                        <input type="number" id="prod-price" required placeholder="80">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="prod-desc">商品描述</label>
                    <textarea id="prod-desc" rows="2" placeholder="詳細規格或手作背後的小故事..."></textarea>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="prod-collection">商品系列 (Collection Tag - 選填)</label>
                        <input type="text" id="prod-collection" placeholder="e.g., Sparkling Collection">
                    </div>
                    <div class="form-group">
                        <label>商品圖片 (選填)</label>
                        <input type="file" id="prod-image-input" accept="image/*" onchange="handleImageUpload(event)">
                        <span id="file-chosen" style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">No file chosen</span>
                    </div>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 1rem;">+ 確認發佈商品</button>
            </form>
        </section>

        <h2 class="category-title">01. 嚴選毛線與材料 / Premium Yarn</h2>
        <div class="products-grid" id="yarn-container"></div>

        <h2 class="category-title">02. 倖存者手作製成品 / Finished Crafts</h2>
        <div class="products-grid" id="crafts-container"></div>
            
    </main>

    <script>
        const ALLOWED_STAFF_EMAILS = ['crochetforherhk@gmail.com'];
        let isStaffAuthenticated = false;
        let currentUploadedImageBase64 = "";

        // 處理圖片上傳與轉碼
        function handleImageUpload(event) {
            const file = event.target.files[0];
            const fileChosen = document.getElementById('file-chosen');
            if (file) {
                if (fileChosen) fileChosen.innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUploadedImageBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                if (fileChosen) fileChosen.innerText = "No file chosen";
                currentUploadedImageBase64 = "";
            }
        }

        function editProduct(id) {
            alert("修改功能開發中！此商品的 ID 為: " + id);
        }
        
        function deleteProduct(id) {
            if(confirm("確定要下架此商品嗎？")) {
                const card = document.querySelector(`[data-id="${id}"]`);
                if (card) card.remove();
            }
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function toggleViewMode() {
            const isStaffMode = document.getElementById('mode-checkbox').checked;
            const staffPanel = document.getElementById('staff-panel');
            const modeStatus = document.getElementById('mode-status');
            
            if (isStaffMode && isStaffAuthenticated) {
                document.body.classList.add('staff-mode-active');
                if (staffPanel) staffPanel.style.display = 'block';
                if (modeStatus) modeStatus.innerText = '職員後台模式';
            } else {
                document.body.classList.remove('staff-mode-active');
                if (staffPanel) staffPanel.style.display = 'none';
                if (modeStatus) modeStatus.innerText = '顧客視角';
                document.getElementById('mode-checkbox').checked = false;
            }
        }
        
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            
            // 記憶登入憑證與狀態
            localStorage.setItem('googleUserToken', JSON.stringify(responsePayload));
            displayUserContent(responsePayload);

            if (ALLOWED_STAFF_EMAILS.includes(responsePayload.email)) {
                isStaffAuthenticated = true;
                localStorage.setItem('isStaffLoggedIn', 'true');
                alert("✨ 驗證成功！已成功解鎖職員管理後台。");
                
                const toggleContainer = document.getElementById('toggle-container');
                const modeCheckbox = document.getElementById('mode-checkbox');
                
                if (toggleContainer) toggleContainer.style.display = 'flex';
                if (modeCheckbox) {
                    modeCheckbox.checked = true;
                    toggleViewMode();
                }
            }
        }

        // 正確渲染頭像，並把原本的 Google 登入按鈕乾淨地隱藏
        function displayUserContent(payload) {
            const loginContainer = document.getElementById('login-container');
            if (loginContainer) {
                loginContainer.innerHTML = `
                    <div class="user-profile-box">
                        <img src="${payload.picture}" style="width: 24px; height: 24px; border-radius: 50%;" alt="User profile">
                        <span style="font-size: 0.85rem; color: var(--text-main); font-weight: 500;">${payload.given_name}</span>
                    </div>
                `;
            }
        }

        // 新增商品與代碼生成
        function addNewProduct(event) {
            event.preventDefault();
            const type = document.getElementById('prod-type').value;
            const title = document.getElementById('prod-title').value;
            const price = parseFloat(document.getElementById('prod-price').value).toFixed(2);
            const desc = document.getElementById('prod-desc').value;
            const collection = document.getElementById('prod-collection').value.trim();
            const status = document.getElementById('prod-status').value;
            const id = Date.now();

            const targetContainer = type === 'craft' ? 
                document.getElementById('crafts-container') : 
                document.getElementById('yarn-container');
            
            const imageHtml = currentUploadedImageBase64 ? 
                `<img src="${currentUploadedImageBase64}" class="product-image" alt="Product Image">` : 
                `<div class="product-image-placeholder">No Image Available</div>`;

            let statusTagHtml = '';
            if (status === 'new') {
                statusTagHtml = `<span class="status-badge status-new">New Product</span>`;
            } else if (status === 'presale') {
                statusTagHtml = `<span class="status-badge status-presale">Presale</span>`;
            } else if (status === 'soldout') {
                statusTagHtml = `<span class="status-badge status-soldout">Out of Stock</span>`;
            }

            const collectionTagHtml = collection ? `<span style="display: inline-block; background: #e5e3df; color: #767471; font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 20px; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">${collection}</span>` : '';
            const priceSuffix = type === 'yarn' ? ' / ball' : '';

            const cardHtml = `
    <div class="product-card" data-id="${id}" data-collection="${collection.toLowerCase()}">
        <div class="staff-actions">
            <button class="delete-btn" style="background: #4b5563; margin-right: 5px;" onclick="editProduct(${id})">修改</button>
            <button class="delete-btn" onclick="deleteProduct(${id})">下架</button>
        </div>
        ${imageHtml}
        <div class="product-info">
            <div>${statusTagHtml}${collectionTagHtml}</div>
            <h4 class="product-title">${title}</h4>
            <p style="color: var(--text-muted); font-size: 0.85rem;">${desc}</p>
            <div class="product-meta">
                <span class="product-price">$${price}${priceSuffix}</span>
                <button class="buy-btn" onclick="alert('Order system coming soon!')">Purchase</button>
            </div>
        </div>
    </div>`;
            
            targetContainer.insertAdjacentHTML('afterbegin', cardHtml);
            
            // 🌟 核心防卡死微調：如果含有圖片，提示使用者代碼已生成在網頁上，引導複製
            const codeToCopy = cardHtml.trim();
            try {
                // 如果字串太大，有些瀏覽器會阻擋 prompt，這裡做個防護
                setTimeout(() => {
                    prompt("✨ 商品排版成功！請複製下方這段自動生成的 HTML 代碼，然後去 GitHub 貼上：", codeToCopy);
                }, 100);
            } catch (err) {
                console.log("自動彈窗失敗，請直接從瀏覽器控制台或頁面元素複製代碼。");
            }

            // 重設表單
            document.getElementById('product-form').reset();
            const fileChosen = document.getElementById('file-chosen');
            if (fileChosen) fileChosen.innerText = "No file chosen";
            currentUploadedImageBase64 = "";
        }

        // 🌟 網頁重新整理時，核心修復：絕對不會再因為找不到物件而卡死
        window.addEventListener('DOMContentLoaded', () => {
            // 1. 先復原使用者基本資訊與頭像
            const savedUser = localStorage.getItem('googleUserToken');
            if (savedUser) {
                try {
                    const payload = JSON.parse(savedUser);
                    displayUserContent(payload); 
                } catch (e) {
                    console.error("恢復顧客登入失敗:", e);
                }
            }

            // 2. 復原職員後台權限
            if (localStorage.getItem('isStaffLoggedIn') === 'true') {
                isStaffAuthenticated = true;
                const toggleContainer = document.getElementById('toggle-container');
                const modeCheckbox = document.getElementById('mode-checkbox');
                
                if (toggleContainer) toggleContainer.style.display = 'flex';
                if (modeCheckbox) {
                    modeCheckbox.checked = true;
                    toggleViewMode();
                }
            }
        });
    </script>
</body>
</html>
